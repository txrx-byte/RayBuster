name = "raybuster"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database Binding (for anomaly storage)
[[d1_databases]]
binding = "DB"
database_name = "raybuster-anomalies"
database_id = "YOUR_D1_DATABASE_ID_HERE"

# Analytics Engine Binding (for high-volume metrics)
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "raybuster_metrics"

# Environment Variables
[vars]
ADMIN_TOKEN = "GENERATE_A_SECURE_RANDOM_STRING_AND_NEVER_COMMIT_TO_GIT"
CF_ACCOUNT_ID = "YOUR_CLOUDFLARE_ACCOUNT_ID_HERE"
ENCRYPTION_KEY = "GENERATE_A_SECURE_32_BYTE_BASE64_ENCODED_AES_KEY"
ADMIN_IP_ALLOWLIST = ""

# Module Rules (for importing .html files as strings)
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# Secrets (set via `wrangler secret put`)
# - CF_API_TOKEN: Cloudflare API token with Analytics Engine read permissions
