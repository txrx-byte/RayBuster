name = "sentinel-platform-v4"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database Binding (for anomaly storage)
[[d1_databases]]
binding = "DB"
database_name = "sentinel-anomalies"
database_id = "YOUR_D1_DATABASE_ID_HERE"

# Analytics Engine Binding (for high-volume metrics)
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "sentinel_metrics"

# Environment Variables
[vars]
ADMIN_TOKEN = "CHANGE_THIS_TO_A_SECURE_RANDOM_STRING"
CF_ACCOUNT_ID = "YOUR_CLOUDFLARE_ACCOUNT_ID_HERE"

# Secrets (set via `wrangler secret put`)
# - CF_API_TOKEN: Cloudflare API token with Analytics Engine read permissions
