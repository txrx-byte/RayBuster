name = "raybuster"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database Binding (for anomaly storage)
[[d1_databases]]
binding = "DB"
database_name = "raybuster-anomalies"
database_id = "YOUR_D1_DATABASE_ID_HERE"

# Analytics Engine Binding (for high-volume metrics)
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "raybuster_metrics"

# Environment Variables
[vars]
CF_ACCOUNT_ID = "YOUR_CLOUDFLARE_ACCOUNT_ID_HERE"
ADMIN_IP_ALLOWLIST = ""

# Module Rules (for importing .html files as strings)
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# Secrets (set via `wrangler secret put`)
# - ADMIN_TOKEN: Secure random string for admin access and token signing.
# - CF_API_TOKEN: Cloudflare API token with Analytics Engine read permissions.
# - ENCRYPTION_KEY: Base64 encoded 32-byte AES key for IP encryption.
# - IP_HASHING_SALT: Salt for IP hashing in telemetry logs.
